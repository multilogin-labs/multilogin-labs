name: Bug report
description: Something broken in docs or scripts
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: npm run api:launch → error...
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: v20.x
