version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["automated", "dependencies"]
  - package-ecosystem: "npm"
    directory: "/cli"
    schedule:
      interval: "weekly"
    labels: ["automated", "cli", "dependencies"]
  - package-ecosystem: "npm"
    directory: "/extensions/vscode-mlx-search"
    schedule:
      interval: "monthly"
    labels: ["automated", "dependencies"]
  - package-ecosystem: "pip"
    directory: "/python"
    schedule:
      interval: "monthly"
    labels: ["automated", "dependencies"]
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    labels: ["automated", "dependencies"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["automated", "ci"]
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    labels: ["automated", "docker"]
