name: Markdown lint + link check

on:
  pull_request:
    paths: ["docs/**", "README.md", "**/*.md"]
  push:
    branches: [main]
    paths: ["docs/**", "README.md", "**/*.md"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Markdownlint (config-free, soft)
        run: |
          npx --yes markdownlint-cli2 "docs/**/*.md" "README.md" "AWESOME.md" || true
      - name: Spellcheck (typos)
        uses: crate-ci/typos@v1
        continue-on-error: true
      - name: Lychee link check (offline + selected http)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --max-concurrency 8 --exclude-mail --accept 200,206,403,429 './docs/**/*.md' README.md
        continue-on-error: true
