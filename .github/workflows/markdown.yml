name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify repo structure
        run: |
          test -f README.md
          test -f docs/getting-started.md
          test -f scripts/api/launch-profile.mjs
          test -f docs/comparisons/multilogin-vs-adspower.md
          test -f tools/plan-calculator.mjs
          test -f docs/comparisons/multilogin-vs-morelogin.md
          test -f docs/playbooks/india.md
          test -f scripts/python/launch_profile.py
          test -f docs/use-cases/web-scraping.md
          test -f docs/SEARCH_INDEX.md
          DOC_COUNT=$(find docs -name '*.md' | wc -l)
          test "$DOC_COUNT" -ge 60
          echo "Structure OK"
