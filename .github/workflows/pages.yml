name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build static site index
        run: |
          mkdir -p _site
          cat > _site/index.html << 'HTML'
          <!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>Multilogin Labs</title>
          <meta http-equiv="refresh" content="0;url=https://github.com/multilogin-labs/multilogin-labs">
          </head><body><p><a href="https://github.com/multilogin-labs/multilogin-labs">Multilogin Labs on GitHub</a></p></body></html>
          HTML
          cp -r docs _site/docs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
