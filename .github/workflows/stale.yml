name: Mark stale issues / PRs

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-message: "This issue has been quiet for 60 days. Closing soon if no further activity."
          stale-pr-message: "This PR has been quiet for 30 days. Closing soon if no further activity."
          exempt-issue-labels: "pinned,roadmap,help-wanted"
          exempt-pr-labels: "pinned,wip"
