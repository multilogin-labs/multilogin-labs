<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Multilogin X API — Swagger UI (community)</title>
  <meta name="description" content="Interactive Multilogin X API explorer — 90 endpoints, OpenAPI 3.0.">
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>
    body { margin: 0; }
    .topbar { background: #0066FF; color: #fff; padding: 0.75rem 1rem; font-family: system-ui, sans-serif; }
    .topbar a { color: #fff; margin-right: 1rem; text-decoration: none; }
    .topbar strong { font-weight: 600; }
  </style>
</head>
<body>
  <div class="topbar">
    <strong>Multilogin Labs — Swagger UI</strong>
    <a href="../index.html">← Hub</a>
    <a href="README.md">API docs</a>
    <a href="CHEATSHEET.md">Cheatsheet</a>
    <a href="https://multilogin.com/pricing/?utm_source=saas&utm_medium=partner&a_aid=saas&a_bid=f5fad549">Partner pricing</a>
    <span style="float:right">Community spec — not affiliated with Multilogin Inc.</span>
  </div>
  <div id="swagger"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    window.ui = SwaggerUIBundle({
      url: "openapi.json",
      dom_id: "#swagger",
      deepLinking: true,
      docExpansion: "none",
      tagsSorter: "alpha",
      operationsSorter: "alpha",
    });
  </script>
</body>
</html>
