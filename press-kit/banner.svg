<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Multilogin Labs banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#0066FF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- decorative grid -->
  <g stroke="#30363d" stroke-width="1" opacity="0.4">
    <path d="M0 100 H1200 M0 200 H1200 M0 300 H1200 M0 400 H1200 M0 500 H1200"/>
    <path d="M100 0 V630 M300 0 V630 M500 0 V630 M700 0 V630 M900 0 V630 M1100 0 V630"/>
  </g>

  <!-- logo block -->
  <g transform="translate(80 200)">
    <rect width="120" height="120" rx="24" fill="#0066FF"/>
    <text x="60" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="48" font-weight="800" fill="#fff">MX</text>
  </g>

  <!-- title -->
  <text x="240" y="270" font-family="system-ui,sans-serif" font-size="64" font-weight="800" fill="url(#brand)">multilogin-labs</text>
  <text x="240" y="320" font-family="system-ui,sans-serif" font-size="28" fill="#e6edf3">The community hub for the Multilogin X API</text>

  <!-- stats -->
  <g font-family="system-ui,sans-serif" fill="#e6edf3">
    <g transform="translate(80 420)">
      <text font-size="48" font-weight="800" fill="#58a6ff">90</text>
      <text y="32" font-size="14" fill="#8b949e">API endpoints</text>
    </g>
    <g transform="translate(220 420)">
      <text font-size="48" font-weight="800" fill="#58a6ff">80</text>
      <text y="32" font-size="14" fill="#8b949e">cookbook recipes</text>
    </g>
    <g transform="translate(400 420)">
      <text font-size="48" font-weight="800" fill="#58a6ff">9</text>
      <text y="32" font-size="14" fill="#8b949e">languages</text>
    </g>
    <g transform="translate(520 420)">
      <text font-size="48" font-weight="800" fill="#58a6ff">600+</text>
      <text y="32" font-size="14" fill="#8b949e">Markdown pages</text>
    </g>
    <g transform="translate(720 420)">
      <text font-size="48" font-weight="800" fill="#58a6ff">20+</text>
      <text y="32" font-size="14" fill="#8b949e">comparisons</text>
    </g>
  </g>

  <!-- footer -->
  <text x="80" y="580" font-family="ui-monospace,Menlo,monospace" font-size="20" fill="#8b949e">github.com/multilogin-labs/multilogin-labs</text>
  <text x="1120" y="580" text-anchor="end" font-family="system-ui,sans-serif" font-size="18" fill="#58a6ff">trial codes · SAAS50 · MIN50</text>
</svg>
